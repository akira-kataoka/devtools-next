name: ✨ 機能要望
description: 新機能 / UX 改善のアイデアを提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        提案ありがとうございます。**5 大基本指針** に沿う改善を優先します:
        1. 各モード (💻 開発者 / ⚙️ 管理者 / 👤 ユーザー) で整合性
        2. 使えない / 誤解させる機能は改修・廃止
        3. 動かない機能を積極的に探索
        4. 誰もが使いやすいツールに (デザイン重視)
        5. 判断が必要な場合はチーム議論

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 / 業務シナリオ
      description: 「いま何に困っているか」「どの業務で必要か」を具体的に
      placeholder: |
        例: 「営業ユーザーが取引先の最近 5 件の Case を確認するのに、SOQL を毎回書くのが面倒」
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する機能 / 改善案
      placeholder: |
        例: 「mini-panel に『関連 Case』ボタンを追加して、現在レコードに紐づく Case を 1 クリックで表示できるようにする」
    validations:
      required: true

  - type: dropdown
    id: target-mode
    attributes:
      label: 対象モード
      multiple: true
      options:
        - 💻 開発者モード (panel / tool)
        - ⚙️ 管理者モード (popup)
        - 👤 ユーザーモード (mini-panel)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案 / 既存機能との関係
      description: 既存機能で代替できないか? 似た機能が他の SF 拡張にあるか?
