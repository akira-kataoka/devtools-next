name: Version consistency
# v3.56.0 (Phase 146): VERSION.txt と manifest.json の version 差異を CI で検出
# Phase 145 で README に追加したドキュメントを実コードに

on:
  push:
    paths:
      - 'VERSION.txt'
      - 'manifest.json'
  pull_request:
    paths:
      - 'VERSION.txt'
      - 'manifest.json'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: VERSION.txt と manifest.json の version を照合
        run: |
          set -e
          VTXT=$(cat VERSION.txt | tr -d ' \n\r')
          MJSON=$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]+"' manifest.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VTXT" ] || [ -z "$MJSON" ]; then
            echo "::error::バージョンを抽出できませんでした (VERSION.txt='$VTXT' manifest.json='$MJSON')"
            exit 1
          fi
          if [ "$VTXT" != "$MJSON" ]; then
            echo "::error::VERSION.txt ($VTXT) ≠ manifest.json ($MJSON) — どちらかが古いままです"
            exit 1
          fi
          echo "✓ Version is consistent: $VTXT"
