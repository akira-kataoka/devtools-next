<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="DevToolsNext: Salesforce 開発者向けの次世代ユーティリティ拡張機能。SOQL/Apex 実行・レコード Inspector・データエクスポート・API URL ビルダー・package.xml ビルダー・設計書ジェネレータ (22 種類・業務向け凡例付き)・Login as User・Login History・Limits ダッシュボードを提供します" />
  <meta name="theme-color" content="#1b96ff" />
  <title>DevToolsNext</title>
  <link rel="stylesheet" href="../css/popup.css" />
</head>
<body>
  <header class="hdr">
    <div class="hdr-l">
      <span class="brand">DevToolsNext</span>
      <span class="mode-badge mode-admin" title="管理者モード — 組織情報・ユーザー管理・Setup ショートカット">⚙️ 管理者</span>
      <span id="versionBadge" class="badge" title="現在のバージョン番号です">v?</span>
      <span id="orgBadge" class="badge">未接続</span>
    </div>
    <div class="hdr-r">
      <button id="btnRefresh" class="ico" title="セッション情報を再取得します">⟳</button>
      <button id="btnCheckUpdate" class="ico" title="アップデートを確認し、新しいバージョンがあれば自動で再読み込みします">⬆</button>
      <button id="btnSettings" class="ico" title="設定画面を開きます">⚙</button>
    </div>
  </header>

  <nav class="tabs" aria-label="メイン タブ">
    <button class="tab active" data-tab="home" aria-label="ホーム + ID 解析">🏠 ホーム</button>
    <button class="tab" data-tab="links" aria-label="便利リンク">🔗 便利リンク</button>
  </nav>

  <main class="panel" id="panel-home">
    <!-- v2.78.0: 抜本簡素化 - 最上部に大型 CTA。SOQL/API/設計書などの主要機能は全画面ツールに集約 -->
    <button id="btnOpenTool" class="primary cta-open-tool" title="DevToolsNext の全機能を 1 つのフルスクリーンタブで起動します (F12 不要)">
      <span class="cta-icon">🛠️</span>
      <span class="cta-body">
        <span class="cta-title">DevToolsNext を全画面で開く</span>
        <span class="cta-sub">SOQL / Inspector / Apex / 設計書 22 種類 / API ビルダー / Limits ほか全機能</span>
      </span>
      <span class="cta-arrow">→</span>
    </button>

    <section class="card">
      <h2>セッション情報</h2>
      <div class="kv"><span>ドメイン</span><code id="info-host">-</code></div>
      <div class="kv"><span>Org ID</span><code id="info-orgid">-</code></div>
      <div class="kv"><span>User ID</span><code id="info-userid">-</code></div>
      <div class="kv"><span>Session</span>
        <code id="info-session">-</code>
        <button class="mini" data-copy="info-session">copy</button>
      </div>
      <div class="kv"><span>API ver</span>
        <select id="info-apiver">
          <option>62.0</option><option>61.0</option><option>60.0</option><option>59.0</option>
        </select>
      </div>
    </section>

    <section class="card">
      <h2>クイックアクション</h2>
      <div class="grid2">
        <button data-act="openSetup" title="Setup 画面を新しいタブで開きます">Setup を開く</button>
        <button data-act="openDevConsole" title="Developer Console を新しいタブで開きます">Developer Console</button>
        <button data-act="openObjectMgr" title="オブジェクトマネージャを開きます">オブジェクトマネージャ</button>
        <button data-act="openProfile" title="自分のユーザプロフィールを開きます">マイプロフィール</button>
        <button data-act="openOrgInfo" title="組織情報 (Company Information) を開きます">組織情報</button>
        <button data-act="logoutUI" title="この組織からログアウトします">ログアウト</button>
      </div>
    </section>

    <section class="card">
      <h2>🔐 他ユーザーとしてログイン (Login as User)</h2>
      <div class="row">
        <input id="loginAsSearch" placeholder="ユーザ名 / 姓名 / Alias / Email で検索できます (有効ユーザのみ)" title="Name/Username/Email/Alias の部分一致で検索し、最終ログイン日時順 30 件を表示します" aria-label="ユーザ検索キーワード" />
        <button id="btnLoginAsSearch" class="primary" aria-label="ユーザーを検索">検索</button>
      </div>
      <div id="loginAsResult" class="login-as-result" role="list" aria-live="polite" aria-atomic="false"></div>
    </section>

    <!-- v2.80.0: 「Salesforce ID 解析」セクションを popup から撤去 (ユーザーから「いらない」フィードバック) -->
  </main>

  <main class="panel hidden" id="panel-links">
    <section class="card">
      <h2>便利リンク</h2>
      <div class="links" id="linkList"></div>
    </section>
  </main>

  <footer class="ftr">
    <span id="statusMsg" role="status" aria-live="polite" aria-atomic="true">準備完了</span>
    <a href="#" id="openDevtools" title="DevToolsNext を新しいタブで全画面起動します">🛠️ ツールを開く</a>
  </footer>

  <script src="../js/popup.js" type="module"></script>
</body>
</html>
