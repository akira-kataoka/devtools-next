<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="DevToolsNext: Salesforce 開発者向けの次世代ユーティリティ拡張機能。SOQL/Apex 実行・レコード Inspector・データエクスポート・API URL ビルダー・package.xml ビルダー・設計書ジェネレータ (21 種類・業務向け凡例付き)・Login as User・Login History・Limits ダッシュボードを提供します" />
  <meta name="theme-color" content="#1b96ff" />
  <title>DevToolsNext</title>
  <link rel="stylesheet" href="../css/popup.css" />
</head>
<body>
  <header class="hdr">
    <div class="hdr-l">
      <span class="brand">DevToolsNext</span>
      <span class="mode-badge mode-admin" title="管理者モード — 組織情報・ユーザー管理・Setup ショートカット">⚙️ 管理者</span>
      <span id="versionBadge" class="badge" title="現在のバージョン番号です">v?</span>
      <span id="orgBadge" class="badge">未接続</span>
      <span id="popupEnvBadge" class="popup-env-badge" style="display:none" title="現在の組織環境 (Sandbox / Production) — PROD は誤操作防止のため警告表示 (Phase 333、3 モード ENV 統一)"></span>
    </div>
    <div class="hdr-r">
      <button id="btnRefresh" class="ico" title="セッション情報を再取得します">⟳</button>
      <button id="btnCheckUpdate" class="ico" title="アップデートを確認し、新しいバージョンがあれば自動で再読み込みします">⬆</button>
      <button id="btnSettings" class="ico" title="🛠 設定 — クリア (履歴/draft/UI 状態/保存/全削除) + 📤 エクスポート (JSON ダウンロード) + 📥 インポート (別 PC への移行用)。番号入力＋確認の 2 段階ダイアログ">⚙</button>
    </div>
  </header>

  <nav class="tabs" aria-label="メイン タブ">
    <button class="tab active" data-tab="home" aria-label="ホーム + ID 解析">🏠 ホーム</button>
    <button class="tab" data-tab="links" aria-label="便利リンク">🔗 便利リンク</button>
  </nav>

  <main class="panel" id="panel-home">
    <!-- v2.78.0: 抜本簡素化 - 最上部に大型 CTA。SOQL/API/設計書などの主要機能は全画面ツールに集約 -->
    <button id="btnOpenTool" class="primary cta-open-tool" title="DevToolsNext の全機能を 1 つのフルスクリーンタブで起動します (F12 不要 / Salesforce タブと別タブで作業可能)">
      <span class="cta-icon">🛠️</span>
      <span class="cta-body">
        <span class="cta-title">💻 開発者モードを全画面で開く</span>
        <span class="cta-sub">SOQL / Inspector / Apex 実行 / 設計書 21 種 / Limits / エビデンス取得 など全機能</span>
      </span>
      <span class="cta-arrow">→</span>
    </button>
    <!-- v3.143.0 Phase 233: 主要ビューへの直接導線 (URL クエリ ?view=xxx で起動) -->
    <!-- v3.187.0 Phase 277: 📐 構造 (describe) も追加して 4 入口統一達成 (popup ⇄ mini-panel ⇄ panel ⇄ tool) -->
    <!-- v3.241.0 Phase 331: 6 ボタンを 2 行 × 3 列 grid 配置に変更 (整然と表示) -->
    <div class="cta-sub-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px">
      <button id="btnOpenAdmin" class="cta-mini" title="👥 ユーザー・ライセンス管理ダッシュボードを全画面で開く (ライセンス使用率 / 凍結ユーザー / MFA / パッケージ等を 1 画面で確認)">
        👥 ユーザー・ライセンス管理
      </button>
      <button id="btnOpenSearch" class="cta-mini" title="🌐 グローバル検索 (SOSL) を全画面で開く — Account/Contact/Lead/Opportunity/Case/User 横断検索">
        🌐 グローバル検索
      </button>
      <button id="btnOpenDescribe" class="cta-mini" title="📐 オブジェクト構造 (describe) を全画面で開く — 全項目/型/必須/参照先を統計サマリ付きで確認 + 設計書 MD コピー対応 (Phase 277)">
        📐 オブジェクト構造
      </button>
      <button id="btnOpenLimits" class="cta-mini" title="📊 使用状況 (Limits) を全画面で開く — API/Storage/Apex CPU/Heap 等の組織制限利用状況を視覚化 (Phase 311)">
        📊 使用状況
      </button>
      <button id="btnOpenApex" class="cta-mini" title="🟧 匿名 Apex 実行を全画面で開く — Debug ログ取得 / ガバナ消費 pill / PROD 確認ダイアログ付き (Phase 322)">
        🟧 Apex 実行
      </button>
      <button id="btnOpenLogin" class="cta-mini" title="🔐 ログイン履歴を全画面で開く — Status (成功/失敗) + 期間 (24h/7日/30日) フィルタ、セキュリティ監査向け (Phase 328)">
        🔐 ログイン履歴
      </button>
    </div>

    <!-- v3.39.0: セッション情報を <details> で折りたたみ可能に (popup 高さ節約) -->
    <details class="card session-card">
      <summary><h2 style="display:inline">セッション情報</h2></summary>
      <div class="kv"><span>ドメイン</span><code id="info-host">-</code></div>
      <div class="kv"><span>Org ID</span><code id="info-orgid">-</code></div>
      <div class="kv"><span>User ID</span><code id="info-userid">-</code></div>
      <div class="kv"><span>Session</span>
        <code id="info-session">-</code>
        <button class="mini" data-copy="info-session">copy</button>
      </div>
      <div class="kv"><span>API ver</span>
        <select id="info-apiver">
          <option>62.0</option><option>61.0</option><option>60.0</option><option>59.0</option>
        </select>
      </div>
    </details>

    <section class="card">
      <h2>⚡ クイックアクション</h2>
      <!-- v2.83.0 Team F: 6 ボタンをアイコン + ラベルの 2 行大型カードに / v3.25.0: aria-label でスクリーンリーダー対応 -->
      <div class="quick-grid" role="group" aria-label="クイックアクション">
        <button class="quick-card" data-act="openSetup" aria-label="Salesforce Setup 画面を開く" title="Salesforce Setup (設定画面) を新しいタブで開きます。プロファイル/権限セット/共有ルール/ユーザー管理/組織設定など、管理者がよく使う設定の入口です">
          <div class="quick-ico" aria-hidden="true">⚙️</div><div class="quick-lbl">設定</div>
        </button>
        <button class="quick-card" data-act="openDevConsole" aria-label="Developer Console を開く" title="Developer Console を新しいタブで開きます。SOQL/Apex 実行・ログ確認の Salesforce 標準ツールですが、機能が限定的なため当拡張の 💻 開発者モード (DevToolsNext タブ) の方が便利です">
          <div class="quick-ico" aria-hidden="true">💻</div><div class="quick-lbl">開発者コンソール</div>
        </button>
        <button class="quick-card" data-act="openObjectMgr" aria-label="オブジェクトマネージャを開く" title="オブジェクトマネージャを新しいタブで開きます。標準/カスタムオブジェクトの項目・ページレイアウト・レコードタイプ等の管理画面に直接遷移できます">
          <div class="quick-ico" aria-hidden="true">📦</div><div class="quick-lbl">オブジェクト管理</div>
        </button>
        <button class="quick-card" data-act="openProfile" aria-label="マイプロフィールを開く" title="自分のユーザプロフィール (ユーザ詳細) を新しいタブで開きます。Login History、割当済プロファイル・権限セット、メール設定等を確認できます">
          <div class="quick-ico" aria-hidden="true">👤</div><div class="quick-lbl">マイプロフィール</div>
        </button>
        <button class="quick-card" data-act="openOrgInfo" aria-label="組織情報を開く" title="組織情報 (Company Information) を新しいタブで開きます。Salesforce Edition、ライセンス、利用容量、組織 ID 等を確認できます (年次更新時の確認資料に有用)">
          <div class="quick-ico" aria-hidden="true">🏢</div><div class="quick-lbl">組織情報</div>
        </button>
        <button class="quick-card quick-card-danger" data-act="logoutUI" aria-label="この組織からログアウト" title="この組織からログアウトします。複数組織を切替える際や、Login as User 後の元ユーザー復帰時にご利用ください">
          <div class="quick-ico" aria-hidden="true">🚪</div><div class="quick-lbl">ログアウト</div>
        </button>
      </div>
    </section>

    <section class="card">
      <h2>🔐 他ユーザーとしてログイン (Login as User)</h2>
      <div class="row">
        <input id="loginAsSearch" placeholder="ユーザ名 / 姓名 / Alias / Email で検索できます (有効ユーザのみ)" title="Name/Username/Email/Alias の部分一致で検索し、最終ログイン日時順 30 件を表示します" aria-label="ユーザ検索キーワード" />
        <button id="btnLoginAsSearch" class="primary" aria-label="ユーザーを検索">検索</button>
      </div>
      <div id="loginAsResult" class="login-as-result" role="list" aria-live="polite" aria-atomic="false"></div>
      <!-- v2.83.0 Team G: 検索履歴 + 最近ログインしたユーザ -->
      <div id="loginAsHistory" class="login-history" aria-label="検索履歴と最近ログインしたユーザ"></div>
    </section>

    <!-- v2.80.0: 「Salesforce ID 解析」セクションを popup から撤去 (ユーザーから「いらない」フィードバック) -->
  </main>

  <main class="panel hidden" id="panel-links">
    <section class="card">
      <h2>便利リンク</h2>
      <input id="linkFilter" type="search" placeholder="🔎 リンク名で絞り込む… (例: プロファイル / ユーザ / Apex)" title="リンク名で部分一致絞り込み (Esc でクリア)" style="width:100%;background:var(--bg);border:1px solid var(--line);color:var(--fg);padding:5px 10px;border-radius:4px;font-size:12px;margin-bottom:8px" />
      <div class="links" id="linkList"></div>
    </section>
  </main>

  <footer class="ftr">
    <span id="statusMsg" role="status" aria-live="polite" aria-atomic="true">準備完了</span>
    <a href="#" id="openDevtools" title="DevToolsNext を新しいタブで全画面起動します">🛠️ ツールを開く</a>
  </footer>

  <script src="../js/popup.js" type="module"></script>
</body>
</html>
